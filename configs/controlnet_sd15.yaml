# ============================================================
# SD 1.5 ControlNet 训练配置
# 数据集 ~4717 对（floor: 3432, top: 1285），batch_size=4
# ControlNet 参数量大，需更长训练: ~10 epoch ≈ 10000 step
#
# 启动方式:
#   bash train.sh controlnet sd15              # 标准多卡
#   bash train.sh controlnet sd15 resume       # 恢复训练
#
# FID 评估:
#   bash train.sh eval_fid --config configs/controlnet_sd15.yaml
# ============================================================

model:
  pretrained_model_name_or_path: "runwayml/stable-diffusion-v1-5"
  model_type: "sd15"

controlnet:
  conditioning_type: "precomputed"   # 使用预提取的 controlnet_color 条件图像
  conditioning_channels: 3

training:
  output_dir: "./outputs/controlnet_sd15"
  num_train_steps: 10000            # ~10 epochs
  learning_rate: 1.0e-5             # ControlNet 用更低学习率，稳定收敛
  train_batch_size: 4
  gradient_accumulation_steps: 2    # effective batch = 8
  mixed_precision: "bf16"

  validation_steps: 1000
  save_steps: 1000
  keep_last_n_checkpoints: 4
  lr_warmup_steps: 300

  gradient_checkpointing: true
  attention_backend: "sdpa"
  enable_channels_last: true
  allow_tf32: true
  dataloader_num_workers: 4

  loss_type: "huber"
  huber_delta: 0.1
  noise_offset: 0.1
  min_snr_gamma: 5.0

data:
  train_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/size_1024/floor"
  conditioning_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/size_1024_controlnet/floor"
  resolution: 512
  caption: "architectural floor plan, blueprint, technical drawing"
  use_aspect_ratio_bucketing: true
  center_crop: false
  random_flip: true

validation:
  prompts:
    - "architectural floor plan, blueprint, technical drawing"
  negative_prompt: "blurry, noisy, low quality, photo"
  num_inference_steps: 25
  guidance_scale: 7.5
  seed: 42
