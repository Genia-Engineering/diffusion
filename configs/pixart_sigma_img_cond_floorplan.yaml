# ============================================================
# PixArt-Sigma 图像条件微调配置 — 建筑平面图
# 用图像编码器替代 T5-XXL 文本编码器，条件信号来自 color 平面图
#
# 训练范式: Rectified Flow (Flow Matching)
# 条件来源: size_1024_controlnet/floor (color 条件图)
# 目标输出: size_1024/floor (详细平面图)
#
# 硬件: 4× NVIDIA A10G (23GB each)
# 显存估算 (per GPU, bf16, gc=ON):
#   cache_latents + cache_cond_features → VAE & DINOv2 不占训练显存
#   Transformer(bf16) ~1.2GB + Adam优化器 ~4.8GB + 梯度 ~1.2GB = 7.2GB
#   VAE 投射层(3×Conv, ~236M params, bf16) ~0.5GB + Adam ~1.9GB + 梯度 ~0.5GB = 2.9GB
#   DINOv2 投射层(MLP, ~33M params) ~0.1GB
#   激活值(gc, batch=8) ~10GB → 合计 VAE ~20.1GB / DINOv2 ~17.3GB < 23GB
#
# 步数推算:
#   train_batch_size=8, grad_accum=2, 4GPUs → effective_batch=64
#   每 epoch ≈ ⌈3400 ÷ 64⌉ = 54 步
#   ~150 epoch ≈ 8000 步
#
# 启动方式:
#   bash train.sh pixart_ic
#   bash train.sh pixart_ic resume
# ============================================================

model:
  pretrained_model_name_or_path: "PixArt-alpha/PixArt-Sigma-XL-2-1024-MS"
  model_type: "pixart_sigma"
  weights_dir: "/home/daiqing_tan/stable_diffusion_lora/weights"

  image_encoder:
    type: "vae"                              # "vae" 或 "dinov2"
    dinov2_model: "facebook/dinov2-large"   # DINOv2 模型 ID (仅 type=dinov2)
    dinov2_resolution: 518                  # DINOv2 输入分辨率 (null=原始分辨率)
    projection_dim: 4096                    # 投射维度 (匹配 caption_channels)
    vae_hidden_channels: [512, 2048]        # VAE 投射层中间通道数 (仅 type=vae)

training:
  output_dir: "./outputs/pixart_img_cond_floorplan"
  num_train_steps: 8000
  learning_rate: 1.0e-5
  train_batch_size: 8
  gradient_accumulation_steps: 2
  mixed_precision: "bf16"
  cache_latents: true
  cache_cond_features: true
  latent_cache_batch_size: 8
  cond_dropout_prob: 0.1                    # CFG 训练时条件丢弃概率
  projector_warmup_steps: 500               # 前 N 步只训练 Projector，冻结 Transformer
  projector_warmup_lr: 1.0e-4               # Projector warmup 阶段学习率 (10× main LR)

  validation_steps: 400
  save_steps: 400
  keep_last_n_checkpoints: 20
  lr_warmup_steps: 500
  gradient_checkpointing: true
  compile_model: false
  loss_type: "mse"

  use_ema: true
  ema_decay: 0.9999
  ema_update_after_step: 300

  timestep_sampling: "logit_normal" # "uniform" 或 "logit_normal"
  logit_mean: 0.0
  logit_std: 1.0
  scheduler_shift: 1.0

data:
  train_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/size_1024/floor"
  conditioning_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/size_1024_controlnet/floor"
  resolution: 1024

validation:
  num_val_images: 4
  num_inference_steps: 50
  guidance_scale: 4.5
  seed: 42

  compute_fid: true
  fid:
    num_real_images: 512
    num_gen_images: 512
    model_name: "dinov2_vitb14"
    batch_size: 8
    real_features_cache: "./outputs/pixart_img_cond_floorplan/fid_real_features.npz"
