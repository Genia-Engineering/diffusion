# ============================================================
# PixArt-Sigma ControlNet 训练配置 — 建筑平面图
# 硬件: 4× NVIDIA A10G (23GB each)
# 数据集: ~3400 张 1024×1024 PNG
#
# 架构: PixArt-Sigma DiT (冻结) + ControlNet Adapter (可训练)
#   - Adapter: 13 个 transformer block (从 DiT 复制) + zero-init projections
#   - 条件图编码: VAE 模式(默认) 或 CNN 编码器模式
#
# 显存估算 (per GPU, bf16, gc=ON, cache_latents+cache_text):
#   VAE 模式:
#     Transformer(bf16, frozen) ~1.2GB + Adapter(bf16) ~0.8GB
#     + Adam优化器(fp32) ~3.2GB + 梯度 ~0.8GB
#     + 激活值(梯度检查点, batch=4) ~6GB → 合计 ~12GB
#   CNN 编码器模式:
#     同上 + CNN encoder ~0.01GB → 合计 ~12GB
#
# 步数推算:
#   train_batch_size=4 per GPU, grad_accum=4, 4GPUs → effective_batch=64
#   每 epoch 约 54 步，60 epoch = 3240 步
#
# 启动方式:
#   bash train.sh pixart_cn           # 标准多卡
#   bash train.sh pixart_cn resume    # 恢复训练
#
# FID 评估:
#   bash train.sh eval_fid --config configs/controlnet_pixart_sigma.yaml
# ============================================================

model:
  pretrained_model_name_or_path: "PixArt-alpha/PixArt-Sigma-XL-2-1024-MS"
  model_type: "pixart_sigma"
  weights_dir: "/home/daiqing_tan/stable_diffusion_lora/weights"

controlnet:
  num_layers: 13                      # adapter 块数量（≤ transformer 总层数 28）
  conditioning_mode: "vae"            # "vae" | "cnn_encoder"
  conditioning_type: "precomputed"    # 使用预提取的条件图像

training:
  output_dir: "./outputs/controlnet_pixart_sigma"
  num_train_steps: 3240               # 60 epoch
  learning_rate: 1.0e-4               # ControlNet adapter 可用较高学习率
  train_batch_size: 4
  gradient_accumulation_steps: 4      # effective batch = 4×4GPU×4accum = 64
  mixed_precision: "bf16"
  cache_latents: true
  cache_text_embeddings: true
  latent_cache_batch_size: 8

  validation_steps: 324               # 每 6 epoch 验证一次 (54 × 6)
  save_steps: 540                     # 每 10 epoch 保存一次 (54 × 10)
  keep_last_n_checkpoints: 6
  lr_warmup_steps: 162                # ~5% 总步数
  gradient_checkpointing: true
  attention_backend: "sdpa"
  allow_tf32: true
  dataloader_num_workers: 4

  loss_type: "huber"
  huber_delta: 0.1
  noise_offset: 0.1
  min_snr_gamma: 5.0

data:
  train_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/llm_1024/floor"
  conditioning_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/llm_1024_controlnet/floor"
  resolution: 1024
  caption: "architectural floor plan, blueprint, technical drawing"
  use_aspect_ratio_bucketing: true
  center_crop: false
  random_flip: true
  t5_max_length: 300

validation:
  prompts:
    - "architectural floor plan, blueprint, technical drawing"
    - "architectural floor plan, blueprint, technical drawing"
    - "architectural floor plan, blueprint, technical drawing"
    - "architectural floor plan, blueprint, technical drawing"
  negative_prompt: ""
  num_inference_steps: 20
  guidance_scale: 4.5
  seed: 42
  num_images_per_prompt: 1
