# ============================================================
# 基础公共配置 — 所有训练任务继承此文件
# 数据集规模 ~3000-4000 张，超参已针对此规模优化
# ============================================================

training:
  seed: 42
  mixed_precision: "bf16"           # bf16 精度（A100/H100/4090）; 旧卡改 "fp16"
  use_8bit_adam: true               # bitsandbytes 8-bit AdamW 节省显存
  gradient_checkpointing: true      # 用计算换显存，约省 30%
  attention_backend: "sdpa"         # "sdpa" (PyTorch 原生, 默认) | "xformers" (需额外安装)
  enable_channels_last: true        # channels_last 内存格式，加速 CNN 卷积层
  allow_tf32: true                  # Ampere+ GPU (A10G/A100/H100) TF32 加速
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_weight_decay: 0.01
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0                # 梯度裁剪
  lr_scheduler: "cosine"            # cosine annealing with warmup

  # 损失函数
  loss_type: "mse"                  # "mse" | "huber"；子配置可覆盖
  huber_delta: 0.1                  # Huber loss 的 delta 参数（仅 loss_type=huber 生效）
  noise_offset: 0.0                 # 噪声偏移量；0 = 关闭，推荐值 0.05~0.1
  min_snr_gamma: 0.0                # Min-SNR 加权系数；0 = 关闭，推荐值 5.0
  lr_warmup_steps: 100
  dataloader_num_workers: 4
  cache_text_embeddings: true       # 预计算并缓存文本嵌入，卸载文本编码器节省显存（仅当 train_text_encoder=false 时生效）
  cache_latents: true              # 预计算所有图片的 VAE latent 存磁盘，训练时跳过 VAE encode，并卸载 encoder 节省显存
  # latent_cache_dir: 各子配置按需指定；未指定时自动放在 train_data_dir 同级的 latent_cache/

  # 保存与验证间隔
  validation_steps: 500             # 每 500 step 生成验证图像
  save_steps: 500                   # 每 500 step 保存权重检查点
  keep_last_n_checkpoints: 3        # 仅保留最近 3 份检查点

data:
  center_crop: false
  random_flip: true
  use_aspect_ratio_bucketing: true

validation:
  prompts:
    - "a photo of a cat sitting on a sofa, high quality"
    - "a landscape painting in studio ghibli style"
    - "portrait of a woman, cinematic lighting, 8k"
    - "a futuristic city at night, neon lights, cyberpunk"
  negative_prompt: "blurry, low quality, artifacts, deformed"
  num_inference_steps: 25
  guidance_scale: 7.5
  seed: 42
  num_images_per_prompt: 1

  # FID 分数计算（默认关闭，开启需安装 scipy）
  compute_fid: false
  fid:
    num_real_images: 512        # 从训练集采样的真实图像数（越多越准确，建议 256~2048）
    num_gen_images: 256         # 每次验证生成的图像数（越多越准确，建议 ≥ 50）
    model_name: "dinov2_vitb14" # DINOv2 模型，可选 dinov2_vits14/vitb14/vitl14/vitg14
    real_features_cache: null   # 真实特征缓存路径（null 则自动放到 output_dir 下）

logging:
  report_to: "tensorboard"
  # log_dir 默认跟随各任务的 training.output_dir/tensorboard，无需在此指定
  # 如需自定义，在子配置中覆盖: logging: {log_dir: "/your/path"}
  log_every_n_steps: 10
