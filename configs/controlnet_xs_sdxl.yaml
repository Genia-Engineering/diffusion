# ============================================================
# SDXL ControlNet-XS 训练配置
#
# ControlNet-XS vs 标准 ControlNet:
#   - 参数量: ~48M (标准 ~1.3B)，仅 base model 的 ~1%
#   - 推理速度: 快 20-25%
#   - 显存占用: 减少 ~45%
#   - 单次联合前向传播，无需分别调用 controlnet + unet
#
# ── 训练模式 (通过 controlnet.train_unet 切换) ─────────────
#
#  train_unet: false → 仅训练 XS Adapter, 冻结 base UNet
#    参数量: ~172M 可训练
#    推荐 lr: 2e-4
#    显存: ~20GB (fp32 master weights, 8-bit Adam, gc=ON, batch=8)
#
#  train_unet: true  → 全参微调 (base UNet + XS Adapter)
#    参数量: ~2.6B + ~172M 全部可训练
#    推荐 lr: 1e-5 (UNet), 可选 controlnet_lr: 1e-4 (XS Adapter)
#    可通过 pretrained_controlnet_path 加载预训练 adapter 权重
#    显存: ~35GB (fp32 master weights, 8-bit Adam, gc=ON, batch=8)
#
# 典型工作流:
#   1. 先以 train_unet=false 训练 XS Adapter 至收敛
#   2. 设置 pretrained_controlnet_path 指向步骤1的 checkpoint
#   3. 切换 train_unet=true 进行全参微调（低 lr 精调 UNet）
#
# 启动方式:
#   bash train.sh controlnetxs sdxl              # 标准多卡
#   bash train.sh controlnetxs sdxl resume       # 恢复训练
#
# FID 评估:
#   bash train.sh eval_fid --config configs/controlnet_xs_sdxl.yaml
# ============================================================

model:
  pretrained_model_name_or_path: "stabilityai/stable-diffusion-xl-base-1.0"
  model_type: "sdxl"
  weights_dir: "/home/daiqing_tan/stable_diffusion_lora/weights"
  # 微调后的 UNet 权重路径（可选）
  # 设置后将用融合 LoRA 后的 UNet 初始化 base model
  # 注释掉或留空则使用原始预训练权重
  merged_unet_path: "/home/daiqing_tan/stable_diffusion_lora/outputs/lora_sdxl/merged_step_000810"

controlnet:
  conditioning_type: "precomputed"
  conditioning_channels: 3

  # ── 训练模式 ──
  # true  = 全参微调: base UNet + XS Adapter 均可训练
  # false = 冻结 base UNet, 仅训练 XS Adapter (~48M, ~1% of base)
  train_unet: true

  # ── 预训练 ControlNet-XS adapter 权重（可选）──
  # 指向之前训练的 checkpoint 目录（含 controlnet/ 子目录），
  # 或直接指向 controlnet/ 目录本身。
  # 设置后加载预训练 adapter 权重再进行训练（全参微调或继续 adapter-only）。
  # pretrained_controlnet_path: ""  # 上轮 checkpoint 已删除，从随机初始化开始

  # ── ControlNet 独立学习率（可选，仅 train_unet=true 时生效）──
  # 设置后 XS Adapter 使用此 lr，base UNet 使用 training.learning_rate
  # 注释掉或设为 0 则 UNet 和 XS Adapter 共享同一 learning_rate
  controlnet_lr: 1.0e-4

controlnet_xs:
  size_ratio: 0.2                  # adapter / base 参数比例；SDXL 下 0.1 ≈ 48M adapter
  no_ctrl_cross_attention: false    # 移除 ctrl 分支的 cross-attention，仅保留 ResNet
                                   # ctrl 不再直接处理文本嵌入，文本语义通过 base→ctrl 投射间接传递
                                   # 与 PixArt-Sigma XS 设计一致

training:
  output_dir: "./outputs/controlnet_xs_sdxl_finetune"
  num_train_steps: 5000
  learning_rate: 1.0e-5            # base UNet 用低 lr
  train_batch_size: 4              # 全参微调显存翻倍，batch 减半
  gradient_accumulation_steps: 8   # 保持 effective batch = 32
  mixed_precision: "bf16"
  cache_latents: true
  latent_cache_batch_size: 16
  cache_text_embeddings: true

  validation_steps: 500
  save_steps: 500
  keep_last_n_checkpoints: 10
  lr_warmup_steps: 500             # 全参微调需更长 warmup 避免震荡
  # lr_min_ratio: 0.1              # cosine 最低衰减到 peak_lr 的 10% (默认 0 即衰减到 0)

  gradient_checkpointing: true
  attention_backend: "sdpa"
  enable_channels_last: true
  allow_tf32: true
  dataloader_num_workers: 4

  loss_type: "huber"
  huber_delta: 0.1
  noise_offset: 0.1
  min_snr_gamma: 5.0
  caption_dropout_rate: 0.1

data:
  train_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/size_1024/floor"
  conditioning_data_dir: "/home/daiqing_tan/stable_diffusion_lora/data/data/size_1024_controlnet/floor"
  resolution: 1024
  caption: "architectural floor plan, blueprint, technical drawing"
  use_aspect_ratio_bucketing: false
  center_crop: false
  random_flip: true

validation:
  # 验证样本数: 从训练集随机抽取 N 对 (条件图, caption, ground truth)
  num_val_samples: 4

  # prompt_source: 验证时文本提示词的来源
  #   "config"  — 使用下方 prompts 列表（适合对比不同描述的泛化能力）
  #   "data"    — 使用训练数据中的逐图 caption（与 caption_mode=per_image 配合）
  prompt_source: "config"

  # caption_mode=fixed 或 prompt_source=config 时使用
  prompts:
    - "architectural floor plan, blueprint, technical drawing"
    - "architectural floor plan, blueprint, technical drawing"
    - "architectural floor plan, blueprint, technical drawing"
    - "architectural floor plan, blueprint, technical drawing"

  negative_prompt: "blurry, noisy, low quality, photo"
  num_inference_steps: 25
  guidance_scale: 7.5
  seed: 42
  num_images_per_prompt: 1

# ── 辅助结构 loss ──────────────────────────────────────────────────
#
# 目的: 让模型更好地学习控制图中各颜色块对应区域的结构信息，
#       只关注"该位置是否有内容"，不关注具体颜色。
#
# 计算流程:
#   1. 从 batch 中随机抽取 ≤ max_decode_samples 个样本
#   2. 由 noise_pred 可微地推算 x0_pred（去噪后的潜变量）
#   3. VAE decode x0_pred → 像素空间 RGB（VAE 权重冻结，梯度穿过回传到 UNet-XS）
#   4. 归一化到 [0,1]，取 max(R,G,B) 得到单通道结构图 ← 消除颜色干扰
#   5. 对预测: sigmoid 软阈值二值化 → pred_soft ∈ [0,1]（可微）
#      对原图: 预缓存时已做硬阈值二值化 → orig_binary ∈ {0,1}
#   6. 从控制图构建 per-label 空间权重 weight_mask（背景=0，前景按 label 赋权）
#   7. loss = Σ[(pred_soft - orig_binary)² × weight_mask × t_quality] / fg_count
#      - weight_mask 在平方之后线性加权（避免 w² 放大）
#      - t_quality = 1 - t/threshold 线性衰减（低 t 预测更可靠，权重更高）
#      - fg_count 前景像素归一化，避免背景面积稀释
#
# 如何消除颜色干扰:
#   max(R,G,B) 将任何颜色的像素映射为亮度值，再经 sigmoid 阈值化变为近似 0/1，
#   因此蓝色门、红色墙、绿色窗在该表示下完全等价（均为 ~1），
#   模型只需学习"此处有内容"而非"此处是什么颜色"。
#
# 梯度流: aux_loss → pixel MSE → VAE decode(冻结) → x0_pred → noise_pred → UNet-XS
#         VAE 不更新权重，仅作为梯度传导的桥梁。
#
auxiliary_loss:
  enabled: true
  weight: 0.003                    # total_loss = diffusion_loss + weight × aux_loss
  timestep_threshold: 500          # 所有 timestep 均计算 (t_quality 线性衰减自动降权高 t)
  fg_threshold: 0.1                # 前景判定阈值 (归一化 [0,1] 后, 背景≈0, 前景>0.1)
  temperature: 20.0                # 预测侧软阈值陡峭度 (越大越接近硬阈值)
  max_decode_samples: 2            # 每步最多 VAE decode 的样本数 (控制显存)
  bg_weight: 0.0                   # 背景区域权重 (0=完全忽略背景)
  labels:                          # 控制图中各语义 label 的 RGB 颜色与权重
    - rgb: [220, 120, 0]           # label_6_deck    平台/甲板 (橙色)
      weight: 1.0
    - rgb: [220, 0, 0]             # label_4_doors   门 (红色)
      weight: 3.0
    - rgb: [20, 50, 230]           # label_5_general_opening  通用开口 (蓝色)
      weight: 2.0
    - rgb: [230, 230, 230]         # label_7_walls   墙体 (浅灰)
      weight: 1.0
    - rgb: [220, 220, 0]           # label_5_stair_opening  楼梯开口 (黄色)
      weight: 2.0
    - rgb: [0, 200, 0]             # label_4_windows 窗户 (绿色)
      weight: 2.0
    - rgb: [180, 0, 200]           # label_8_posts   立柱/柱子 (紫色)
      weight: 1.0
